<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #050505;
      color: #fafafa;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap {
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .wrap img {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .sub {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #22c55e;
      opacity: 0.7;
    }
    @keyframes fadeIn {
      to { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="sub">Introducing</p>
    <img src="img/Untitled design-4_compressed.png" alt="Orion" style="margin-top:24px">
  </div>
</body>
</html>
